<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#9b59b6" />
  <title>Рушковский Сергей</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:      #17121f;
      --text:    #f0e6ff;
      --sub:     #b09dc8;
      --btn:     #9b59b6;
      --btn-h:   #a967c7;
      --btn-txt: #ffffff;
      --shadow:  rgba(155,89,182,.35);
      --div:     rgba(155,89,182,.35);
      --sec-txt: #c39bd3;
      --r:       14px;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background .35s, color .35s;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Переключатель языка ── */
    .lang-toggle {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 100;
      display: flex;
      background: var(--btn);
      border-radius: 20px;
      padding: 3px;
      box-shadow: 0 2px 10px var(--shadow);
      gap: 2px;
    }
    .lang-btn {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      padding: 4px 10px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      background: transparent;
      color: rgba(255,255,255,.6);
      transition: background .2s, color .2s;
      -webkit-user-select: none; user-select: none;
    }
    .lang-btn.active {
      background: rgba(255,255,255,.25);
      color: #fff;
    }

    /* ── Контейнер ── */
    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 36px 16px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* ── Аватар ── */
    .avatar, .avatar-ph {
      width: 104px; height: 104px;
      border-radius: 50%;
      border: 3px solid var(--btn);
      box-shadow: 0 6px 24px var(--shadow);
    }
    .avatar { object-fit: cover; display: block; }
    .avatar-ph {
      background: linear-gradient(135deg, #9b59b6, #6c3483);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; font-weight: 700; color: #fff;
    }

    /* ── Шапка ── */
    .name  { font-size: 22px; font-weight: 800; text-align: center; transition: opacity .2s; }
    .role  { font-size: 13.5px; font-weight: 500; color: var(--btn); text-align: center; transition: opacity .2s; }
    .line  { width: 48px; height: 2px; border-radius: 2px; background: var(--div); margin: 2px 0; }
    .desc  { font-size: 13px; color: var(--sub); text-align: center; line-height: 1.75; max-width: 370px; transition: opacity .2s; }
    .desc strong { color: var(--text); font-weight: 600; }

    /* ── Анимация смены языка ── */
    .fade { opacity: 0; transition: opacity .15s; }

    /* ── Кнопки ── */
    .btns { width: 100%; display: flex; flex-direction: column; gap: 9px; margin-top: 4px; }

    .section {
      display: flex; align-items: center; gap: 10px;
      width: 100%; margin-top: 6px;
    }
    .section-line { flex: 1; height: 1px; background: var(--div); border-radius: 1px; }
    .section-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--sec-txt); white-space: nowrap;
      display: flex; align-items: center; gap: 5px;
    }

    .row-2 { display: flex; gap: 9px; width: 100%; }
    .row-2 .btn { flex: 1; }

    .btn {
      display: flex; align-items: center;
      padding: 13px 16px;
      background: var(--btn); color: var(--btn-txt);
      border-radius: var(--r);
      text-decoration: none;
      font-size: 13.5px; font-weight: 600;
      gap: 10px;
      box-shadow: 0 3px 12px var(--shadow);
      transition: background .18s, transform .12s, box-shadow .18s;
      -webkit-user-select: none; user-select: none;
    }
    .btn:hover  { background: var(--btn-h); box-shadow: 0 5px 18px var(--shadow); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); box-shadow: 0 2px 8px var(--shadow); }

    .ico { width: 20px; height: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .ico svg { display: block; }
    .lbl { flex: 1; line-height: 1.3; }
    .arr { opacity: .6; flex-shrink: 0; display: flex; align-items: center; }

    @media (max-width: 340px) {
      .btn { font-size: 12px; padding: 11px 12px; }
      .name { font-size: 19px; }
    }
  </style>
</head>

<script>
(function () {

  /* ── Переводы ──────────────────────────────────────── */
  var T = {
    ru: {
      name:          'Рушковский Сергей',
      role:          'Интернет-маркетолог · Параспортсмен · Иркутск',
      desc:          'Продвигаю компании в России и за рубежом с помощью <strong>AI-технологий</strong>.<br/>Восстанавливаюсь после перелома позвоночника и веду об этом блог.',
      sec_contact:   'Написать мне',
      sec_work:      'Сфера деятельности',
      sec_projects:  'Мои проекты',
      btn_marketing: 'Интернет-продвижение вашего бренда',
      btn_monastery: 'Восстанавливаем монастырь в Иркутске',
      btn_baikal:    'О том, как я Байкал покорил',
      btn_rehab:     'Иркутский клуб спинальной реабилитации',
      btn_family:    'История семьи Рушковских в Сибири'
    },
    en: {
      name:          'Sergey Rushkovsky',
      role:          'Internet Marketer · Para-athlete · Irkutsk',
      desc:          'I help companies grow in Russia and abroad using <strong>AI technologies</strong>.<br/>Recovering from a spinal fracture and documenting my journey in a blog.',
      sec_contact:   'Contact Me',
      sec_work:      'Field of Activity',
      sec_projects:  'My Projects',
      btn_marketing: 'Internet Marketing for Your Brand',
      btn_monastery: 'Restoring a Monastery in Irkutsk',
      btn_baikal:    'How I Conquered Lake Baikal',
      btn_rehab:     'Irkutsk Spinal Rehabilitation Club',
      btn_family:    'The Rushkovsky Family History in Siberia'
    }
  };

  var currentLang = 'ru';

  /* ── Применить язык ────────────────────────────────── */
  function applyLang(lang) {
    var dict = T[lang];

    /* Обычный текст */
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      var key = el.getAttribute('data-i18n');
      if (dict[key] !== undefined) el.textContent = dict[key];
    });

    /* HTML-контент (описание с тегами) */
    document.querySelectorAll('[data-i18n-html]').forEach(function (el) {
      var key = el.getAttribute('data-i18n-html');
      if (dict[key] !== undefined) el.innerHTML = dict[key];
    });

    /* Переключатели */
    document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');

    document.documentElement.lang = lang;
    currentLang = lang;
  }

  /* ── Публичная функция переключения ───────────────── */
  window.setLang = function (lang) {
    if (lang === currentLang) return;
    /* Лёгкое затухание */
    var els = document.querySelectorAll('[data-i18n], [data-i18n-html]');
    els.forEach(function (el) { el.style.opacity = '0'; });
    setTimeout(function () {
      applyLang(lang);
      els.forEach(function (el) { el.style.opacity = '1'; el.style.transition = 'opacity .2s'; });
    }, 140);
  };

  /* ── Telegram WebApp ───────────────────────────────── */
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  /* ── Первый рендер ─────────────────────────────────── */
  applyLang('ru');

})();
</script>
